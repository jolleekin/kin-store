name: Publish to JSR

on:
  push:
    tags:
      - "core@*"
      - "plugins@*"
      - "react@*"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
      - run: deno lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
      - run: deno test -A core plugins react

  publish-core:
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/core@')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
      - run: deno publish
        working-directory: core

  publish-plugins:
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/plugins@')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
      - run: deno publish
        working-directory: plugins

  publish-react:
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/react@')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
      - run: deno publish
        working-directory: react
